services:
  tide:
    build: .
    container_name: tide
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-tide}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tide-network

networks:
  tide-network:
    driver: bridge